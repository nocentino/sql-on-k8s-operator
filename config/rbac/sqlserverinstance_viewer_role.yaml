# This rule is not used by the project sql-on-k8s-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to sql.mssql.microsoft.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: sql-on-k8s-operator
    app.kubernetes.io/managed-by: kustomize
  name: sqlserverinstance-viewer-role
rules:
- apiGroups:
  - sql.mssql.microsoft.com
  resources:
  - sqlserverinstances
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - sql.mssql.microsoft.com
  resources:
  - sqlserverinstances/status
  verbs:
  - get
