# This rule is not used by the project sql-on-k8s-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the sql.mssql.microsoft.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: sql-on-k8s-operator
    app.kubernetes.io/managed-by: kustomize
  name: sqlserverinstance-editor-role
rules:
- apiGroups:
  - sql.mssql.microsoft.com
  resources:
  - sqlserverinstances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - sql.mssql.microsoft.com
  resources:
  - sqlserverinstances/status
  verbs:
  - get
