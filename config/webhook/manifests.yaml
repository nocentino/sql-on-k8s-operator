---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-sql-mssql-microsoft-com-v1alpha1-sqlserveravailabilitygroup
  failurePolicy: Fail
  name: vsqlserveravailabilitygroup-v1alpha1.kb.io
  rules:
  - apiGroups:
    - sql.mssql.microsoft.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - sqlserveravailabilitygroups
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-sql-mssql-microsoft-com-v1alpha1-sqlserverinstance
  failurePolicy: Fail
  name: vsqlserverinstance-v1alpha1.kb.io
  rules:
  - apiGroups:
    - sql.mssql.microsoft.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - sqlserverinstances
  sideEffects: None
