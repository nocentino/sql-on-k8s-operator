# SQLServerInstance sample — standalone SQL Server 2025 Developer Edition
# Prerequisites:
#   kubectl create secret generic mssql-secret \
#     --from-literal=SA_PASSWORD='YourStrong!Passw0rd'
apiVersion: sql.mssql.microsoft.com/v1alpha1
kind: SQLServerInstance
metadata:
  name: mssql-standalone
  namespace: default
spec:
  image: mcr.microsoft.com/mssql/server:2025-latest
  edition: Developer
  acceptEula: "Y"
  saPasswordSecretRef:
    name: mssql-secret
    key: SA_PASSWORD
  port: 1433
  serviceType: LoadBalancer
  storage:
    dataVolumeSize: "10Gi"
    reclaimPolicy: Retain
  mssqlConf:
    "sqlagent.enabled": "true"
  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2"
