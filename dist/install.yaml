                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                  optional:
                    description: Specify whether the Secret or its key must be defined
                    type: boolean
                required:
                - key
                type: object
                x-kubernetes-map-type: atomic
              storage:
                description: Storage defines PVC settings shared by all replica pods.
                properties:
                  accessModes:
                    default:
                    - ReadWriteOnce
                    description: AccessModes defines the access mode for the PVC.
                    items:
                      type: string
                    type: array
                  dataVolumeSize:
                    anyOf:
                    - type: integer
                    - type: string
                    default: 10Gi
                    description: DataVolumeSize is the size of the PVC for SQL Server
                      data and log files.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  reclaimPolicy:
                    default: Retain
                    description: |-
                      ReclaimPolicy controls what happens to the underlying PersistentVolume when the
                      PVC is deleted. The operator patches the bound PV's reclaimPolicy to match this
                      field on every reconcile, overriding the StorageClass default.
                        Retain  — PV is kept after the PVC is deleted; data is preserved for manual recovery.
                        Delete  — PV and its backing storage are deleted together with the PVC.
                      Defaults to Retain to protect SQL Server data from accidental loss.
                    enum:
                    - Retain
                    - Delete
                    type: string
                  storageClassName:
                    description: StorageClassName is the name of the StorageClass
                      to use (e.g. standard, managed-csi).
                    type: string
                type: object
              tolerations:
                description: Tolerations for all replica pods.
                items:
                  description: |-
                    The pod this Toleration is attached to tolerates any taint that matches
