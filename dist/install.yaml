                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              initializationComplete:
                description: InitializationComplete indicates whether the AG T-SQL
                  bootstrap has completed.
                type: boolean
              phase:
                description: Phase summarizes the overall lifecycle phase.
                type: string
              primaryNotReadySince:
                description: |-
                  PrimaryNotReadySince records when the current primary pod first became NotReady.
